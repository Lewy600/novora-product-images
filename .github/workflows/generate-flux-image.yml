name: Generate FLUX Image

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image generation prompt'
        required: true
        type: string
      filename:
        description: 'Output filename (e.g. product-name-hero.png)'
        required: true
        type: string
      reference_image_url:
        description: 'Optional reference image URL for image-to-image'
        required: false
        type: string
      aspect_ratio:
        description: 'Aspect ratio'
        required: false
        type: string
        default: '1:1'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Submit FLUX generation request
        id: submit
        env:
          BFL_API_KEY: ${{ secrets.BFL_API_KEY }}
          PROMPT_INPUT: ${{ inputs.prompt }}
          REF_IMG_INPUT: ${{ inputs.reference_image_url }}
          ASPECT_INPUT: ${{ inputs.aspect_ratio }}
        run: |
          python3 << 'PYEOF'
          import json, os
          prompt = os.environ.get('PROMPT_INPUT')
          ref_img = os.environ.get('REF_IMG_INPUT')
          aspect = os.environ.get('ASPECT_INPUT')
          payload = {"prompt": prompt, "aspect_ratio": aspect}
          endpoint = "https://api.bfl.ai/v1/flux-pro-1.1"
          if ref_img:
              payload["input_image"] = ref_img
              endpoint = "https://api.bfl.ai/v1/flux-kontext-pro"
          with open('payload.json', 'w') as f:
              json.dump(payload, f)
          with open('endpoint.txt', 'w') as f:
              f.write(endpoint)
          PYEOF
          curl -s -X POST "$(cat endpoint.txt)" \
            -H "accept: application/json" \
            -H "x-key: $BFL_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            > response.json
          cat response.json

      - name: Poll for result
        id: poll
        env:
          BFL_API_KEY: ${{ secrets.BFL_API_KEY }}
        run: |
          POLLING_URL=$(python3 -c "import json; print(json.load(open('response.json')).get('polling_url',''))")
          echo "Polling URL: $POLLING_URL"
          if [ -z "$POLLING_URL" ]; then
            echo "No polling_url in response - submission likely failed"
            exit 0
          fi
          for i in $(seq 1 20); do
            sleep 3
            curl -s -X GET "$POLLING_URL" -H "accept: application/json" -H "x-key: $BFL_API_KEY" > poll_result.json
            STATUS=$(python3 -c "import json; print(json.load(open('poll_result.json')).get('status',''))")
            echo "Poll $i: status=$STATUS"
            if [ "$STATUS" == "Ready" ]; then
              IMAGE_URL=$(python3 -c "import json; print(json.load(open('poll_result.json'))['result']['sample'])")
              echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT
              break
            fi
          done

      - name: Commit debug info and image
        if: always()
        run: |
          mkdir -p debug products
          cp response.json debug/last_response.json || true
          cp poll_result.json debug/last_poll_result.json || true
          if [ -n "${{ steps.poll.outputs.image_url }}" ]; then
            curl -s -o "products/${{ inputs.filename }}" "${{ steps.poll.outputs.image_url }}"
          fi
          git config user.name "FLUX Bot"
          git config user.email "flux-bot@example.com"
          git add debug/ products/ 2>/dev/null || true
          git commit -m "Debug + result for ${{ inputs.filename }}" || echo "nothing to commit"
          git pull --rebase origin main
          git push
